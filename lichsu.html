<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IUMoney - Lịch Sử</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Be Vietnam Pro', sans-serif; background: #0a0a14; color: #fff; min-height: 100vh; padding-bottom: 30px; }
  .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 200; }
  .sidebar-overlay.show { display: block; }
  .sidebar { position: fixed; top: 0; left: -260px; width: 260px; height: 100%; background: #13132a; border-right: 1px solid #222244; z-index: 201; transition: left .25s ease; }
  .sidebar.show { left: 0; }
  .sidebar-header { padding: 24px 20px 16px; border-bottom: 1px solid #222244; font-size: 1.1rem; font-weight: 800; }
  .sidebar-header span { color: #a78fff; }
  .sidebar-user { display: flex; align-items: center; gap: 10px; padding: 14px 20px; border-bottom: 1px solid #222244; }
  .sidebar-user img { width: 38px; height: 38px; border-radius: 50%; border: 2px solid #6c47ff; }
  .sidebar-user .uname { font-size: .88rem; font-weight: 700; }
  .sidebar-user .utag { font-size: .72rem; color: #6666aa; }
  .sidebar-menu { padding: 12px 0; }
  .sidebar-item { display: flex; align-items: center; gap: 14px; padding: 15px 20px; font-size: .95rem; font-weight: 600; color: #9999bb; cursor: pointer; transition: all .2s; }
  .sidebar-item:hover { background: #1e1e3a; color: #fff; }
  .sidebar-item.active { color: #a78fff; background: rgba(108,71,255,.1); }
  .sidebar-item .s-icon { font-size: 1.2rem; width: 24px; text-align: center; }
  .sidebar-logout { margin: 8px 16px; padding: 11px; background: rgba(255,50,50,.1); border: 1px solid rgba(255,50,50,.2); border-radius: 10px; color: #ff6666; font-size: .85rem; font-weight: 700; cursor: pointer; text-align: center; }
  .sidebar-logout:hover { background: rgba(255,50,50,.2); }
  .header { padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: #0a0a14; border-bottom: 1px solid #111128; z-index: 100; }
  .logo-text { font-size: 1.1rem; font-weight: 800; }
  .logo-text span { color: #a78fff; }
  .icon-btn { width: 40px; height: 40px; background: #1a1a2e; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; cursor: pointer; }
  .user-info { display: flex; align-items: center; gap: 8px; }
  .user-info img { width: 34px; height: 34px; border-radius: 50%; border: 2px solid #6c47ff; display: none; }
  .user-info span { font-size: .82rem; font-weight: 700; color: #a78fff; }
  .wrap { padding: 16px; display: flex; flex-direction: column; gap: 14px; }
  .filter-row { display: flex; gap: 8px; }
  .filter-btn { background: #13132a; border: 1px solid #222244; border-radius: 20px; padding: 7px 16px; font-size: .8rem; font-weight: 700; color: #9999bb; cursor: pointer; transition: all .2s; font-family: inherit; }
  .filter-btn:hover { border-color: #6c47ff; color: #a78fff; }
  .filter-btn.active { background: rgba(108,71,255,.15); border-color: #6c47ff; color: #a78fff; }
  .history-list { display: flex; flex-direction: column; gap: 10px; }
  .history-item { background: #13132a; border: 1px solid #222244; border-radius: 14px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
  .hi-icon { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; }
  .hi-icon.earn { background: rgba(74,222,128,.12); }
  .hi-icon.withdraw { background: rgba(167,143,255,.12); }
  .hi-icon.ref { background: rgba(251,191,36,.12); }
  .hi-info { flex: 1; }
  .hi-desc { font-size: .85rem; font-weight: 600; margin-bottom: 3px; white-space: pre-line; }
  .hi-time { font-size: .72rem; color: #6666aa; }
  .hi-status { font-size: .68rem; color: #fbbf24; margin-top: 2px; }
  .hi-status.done { color: #4ade80; }
  .hi-amount { font-size: .95rem; font-weight: 800; text-align: right; white-space: nowrap; }
  .hi-amount.plus { color: #4ade80; }
  .hi-amount.minus { color: #a78fff; }
  .empty-state { text-align: center; padding: 40px 20px; color: #555577; }
  .empty-state .ei { font-size: 2.5rem; margin-bottom: 12px; }
  .empty-state p { font-size: .85rem; }
  .stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .mini-card { background: #13132a; border: 1px solid #222244; border-radius: 14px; padding: 14px; }
  .mini-card .ml { font-size: .67rem; font-weight: 700; color: #6666aa; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
  .mini-card .mv { font-size: 1.2rem; font-weight: 800; }
  .loading-screen { position: fixed; inset: 0; background: #0a0a14; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; gap: 16px; }
  .loading-screen .logo { font-size: 1.5rem; font-weight: 800; }
  .loading-screen .logo span { color: #a78fff; }
  .spinner { width: 36px; height: 36px; border: 3px solid #222244; border-top-color: #6c47ff; border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .banned-screen { position: fixed; inset: 0; background: #0a0a14; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; gap: 16px; text-align: center; padding: 20px; }
  .banned-screen .bi { font-size: 3.5rem; }
  .banned-screen h2 { font-size: 1.2rem; font-weight: 800; color: #ff6666; }
  .banned-screen p { font-size: .85rem; color: #9999bb; max-width: 300px; }
</style>
</head>
<body>

<div class="loading-screen" id="loading">
  <div class="logo">IU<span>Money</span></div>
  <div class="spinner"></div>
  <div style="font-size:.8rem;color:#6666aa">Đang tải...</div>
</div>

<div class="banned-screen" id="banned-screen">
  <div class="bi">🔒</div>
  <h2>Tài khoản đã bị khóa</h2>
  <p>Liên hệ admin nếu bạn cho rằng đây là nhầm lẫn.</p>
</div>

<div class="sidebar-overlay" id="overlay"></div>
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">IU<span>Money</span></div>
  <div class="sidebar-user">
    <img id="sidebar-avatar" src="" />
    <div>
      <div class="uname" id="sidebar-name">...</div>
      <div class="utag">Thành viên</div>
    </div>
  </div>
  <div class="sidebar-menu">
    <div class="sidebar-item" onclick="location.href='/app'"><span class="s-icon">🏠</span> Dashboard</div>
    <div class="sidebar-item" onclick="location.href='/nhiemvu'"><span class="s-icon">⚡</span> Nhiệm Vụ</div>
    <div class="sidebar-item" onclick="location.href='/ruttien'"><span class="s-icon">💸</span> Rút Tiền</div>
    <div class="sidebar-item active" onclick="location.href='/lichsu'"><span class="s-icon">📋</span> Lịch Sử</div>
    <div class="sidebar-item" onclick="location.href='/invite'"><span class="s-icon">👥</span> Mời Bạn Bè</div>
  </div>
  <div class="sidebar-logout" id="btn-logout">🚪 Đăng xuất</div>
</div>

<div class="header">
  <div class="icon-btn" id="menu-btn">☰</div>
  <div class="logo-text">IU<span>Money</span></div>
  <div class="user-info">
    <img id="header-avatar" />
    <span id="header-name"></span>
  </div>
</div>

<div class="wrap">
  <div class="stat-row">
    <div class="mini-card">
      <div class="ml">Tổng đã kiếm</div>
      <div class="mv" style="color:#4ade80" id="total-earned">0đ</div>
    </div>
    <div class="mini-card">
      <div class="ml">Tổng đã rút</div>
      <div class="mv" style="color:#a78fff" id="total-withdrawn">0đ</div>
    </div>
  </div>

  <div class="filter-row">
    <button class="filter-btn active" onclick="filterHistory('all', this)">Tất cả</button>
    <button class="filter-btn" onclick="filterHistory('earn', this)">Kiếm tiền</button>
    <button class="filter-btn" onclick="filterHistory('withdraw', this)">Rút tiền</button>
    <button class="filter-btn" onclick="filterHistory('ref', this)">Hoa hồng</button>
  </div>

  <div class="history-list" id="history-list"></div>
</div>

<script>
  const BOT_API = 'https://thichtien-production.up.railway.app';
  let allHistory = [];

  function renderHistory(filter) {
    const list = document.getElementById('history-list');
    const items = filter === 'all' ? allHistory : allHistory.filter(h => h.type === filter);

    if (items.length === 0) {
      list.innerHTML = `<div class="empty-state"><div class="ei">📭</div><p>Chưa có giao dịch nào</p></div>`;
      return;
    }

    list.innerHTML = items.map(function(h) {
      const isPlus = h.amount > 0;
      const icon = h.type === 'earn' ? '⚡' : h.type === 'ref' ? '👥' : '💸';
      const iconClass = h.type === 'earn' ? 'earn' : h.type === 'ref' ? 'ref' : 'withdraw';
      let statusHtml = '';
      if (h.status === 'pending') statusHtml = '<div class="hi-status">⏳ Đang xử lý</div>';
      if (h.status === 'done') statusHtml = '<div class="hi-status done">✅ Đã hoàn thành</div>';
      const descText = h.orderId ? `${h.desc}\nMã đơn: ${h.orderId}` : h.desc;
      return `
        <div class="history-item">
          <div class="hi-icon ${iconClass}">${icon}</div>
          <div class="hi-info">
            <div class="hi-desc">${descText}</div>
            <div class="hi-time">${h.time}</div>
            ${statusHtml}
          </div>
          <div class="hi-amount ${isPlus ? 'plus' : 'minus'}">
            ${isPlus ? '+' : ''}${Math.abs(h.amount).toLocaleString('vi')}đ
          </div>
        </div>
      `;
    }).join('');
  }

  function filterHistory(type, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderHistory(type);
  }

  async function init() {
    const savedToken = localStorage.getItem('discord_token');
    if (!savedToken) { window.location.href = '/'; return; }

    try {
      const res = await fetch('https://discord.com/api/users/@me', {
        headers: { Authorization: 'Bearer ' + savedToken }
      });
      const user = await res.json();
      if (!user.id) { localStorage.removeItem('discord_token'); window.location.href = '/'; return; }

      const avatar = user.avatar
        ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`
        : `https://cdn.discordapp.com/embed/avatars/0.png`;

      document.getElementById('header-avatar').src = avatar;
      document.getElementById('header-avatar').style.display = 'block';
      document.getElementById('header-name').textContent = user.username;
      document.getElementById('sidebar-avatar').src = avatar;
      document.getElementById('sidebar-name').textContent = user.username;

      const dataRes = await fetch(`${BOT_API}/api/user/${user.id}`);
      const userData = await dataRes.json();

      if (userData.banned) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('banned-screen').style.display = 'flex';
        return;
      }

      allHistory = userData.history || [];
      const totalEarned = allHistory.filter(h => h.amount > 0).reduce((s, h) => s + h.amount, 0);
      const totalWithdrawn = allHistory.filter(h => h.amount < 0).reduce((s, h) => s + Math.abs(h.amount), 0);

      document.getElementById('total-earned').textContent = totalEarned.toLocaleString('vi') + 'đ';
      document.getElementById('total-withdrawn').textContent = totalWithdrawn.toLocaleString('vi') + 'đ';

      renderHistory('all');
      document.getElementById('loading').style.display = 'none';

    } catch(e) {
      localStorage.removeItem('discord_token');
      window.location.href = '/';
    }
  }

  document.addEventListener('DOMContentLoaded', function() {
    init();
    document.getElementById('menu-btn').addEventListener('click', function() {
      document.getElementById('sidebar').classList.add('show');
      document.getElementById('overlay').classList.add('show');
    });
    document.getElementById('overlay').addEventListener('click', function() {
      document.getElementById('sidebar').classList.remove('show');
      document.getElementById('overlay').classList.remove('show');
    });
    document.getElementById('btn-logout').addEventListener('click', function() {
      localStorage.removeItem('discord_token');
      window.location.href = '/';
    });
  });

  document.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('keydown', function(e) {
    if (e.key === 'F12') e.preventDefault();
    if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) e.preventDefault();
    if (e.ctrlKey && e.key === 'U') e.preventDefault();
  });
</script>

<!-- MUSIC PLAYER -->
<div id="music-player" style="position:fixed;bottom:16px;right:16px;background:#13132a;border:1px solid #222244;border-radius:16px;padding:12px 14px;z-index:500;width:230px;box-shadow:0 8px 24px rgba(0,0,0,.4);">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
    <div style="width:36px;height:36px;background:linear-gradient(135deg,#6c47ff,#a78fff);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;">🎵</div>
    <div style="flex:1;overflow:hidden;">
      <div id="music-name" style="font-size:.78rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff;">Music 1</div>
      <div style="font-size:.65rem;color:#6666aa;">IUMoney Radio</div>
    </div>
    <button onclick="closeMusicPlayer()" style="background:none;border:none;color:#555577;font-size:1rem;cursor:pointer;padding:0 2px;">✕</button>
  </div>
  <input type="range" id="music-seek" value="0" min="0" max="100" style="width:100%;height:4px;accent-color:#6c47ff;margin-bottom:8px;cursor:pointer;">
  <div style="display:flex;align-items:center;justify-content:center;gap:14px;">
    <button onclick="prevMusic()" style="background:none;border:none;color:#a78fff;font-size:1.1rem;cursor:pointer;">⏮</button>
    <button onclick="toggleMusic()" id="music-play-btn" style="background:#6c47ff;border:none;color:#fff;font-size:1rem;width:34px;height:34px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;">▶</button>
    <button onclick="nextMusic()" style="background:none;border:none;color:#a78fff;font-size:1.1rem;cursor:pointer;">⏭</button>
  </div>
</div>

<div id="music-bubble" onclick="openMusicPlayer()" style="display:none;position:fixed;bottom:16px;right:16px;width:48px;height:48px;background:linear-gradient(135deg,#6c47ff,#a78fff);border-radius:50%;z-index:500;align-items:center;justify-content:center;font-size:1.3rem;cursor:pointer;box-shadow:0 8px 24px rgba(108,71,255,.4);">🎵</div>

<audio id="audio-player"></audio>

<script>
  const playlist = [
    { name: 'Music 1', src: '/music/music1.mp3' },
    { name: 'Music 2', src: '/music/music2.mp3' },
    { name: 'Music 3', src: '/music/music3.mp3' },
    { name: 'Music 4', src: '/music/music4.mp3' },
    { name: 'Music 5', src: '/music/music5.mp3' },
  ];
  let currentTrack = 0;
  let isPlaying = false;
  const audio = document.getElementById('audio-player');

  function loadTrack(i, autoplay) {
    currentTrack = i;
    audio.src = playlist[i].src;
    document.getElementById('music-name').textContent = playlist[i].name;
    if (autoplay) { audio.play(); isPlaying = true; document.getElementById('music-play-btn').textContent = '⏸'; }
  }
  function toggleMusic() {
    if (isPlaying) { audio.pause(); isPlaying = false; document.getElementById('music-play-btn').textContent = '▶'; }
    else { audio.play(); isPlaying = true; document.getElementById('music-play-btn').textContent = '⏸'; }
  }
  function nextMusic() { loadTrack((currentTrack + 1) % playlist.length, true); }
  function prevMusic() { loadTrack((currentTrack - 1 + playlist.length) % playlist.length, true); }
  function closeMusicPlayer() {
    document.getElementById('music-player').style.display = 'none';
    document.getElementById('music-bubble').style.display = 'flex';
  }
  function openMusicPlayer() {
    document.getElementById('music-player').style.display = 'block';
    document.getElementById('music-bubble').style.display = 'none';
  }
  audio.addEventListener('ended', nextMusic);
  audio.addEventListener('timeupdate', function() {
    if (audio.duration) document.getElementById('music-seek').value = (audio.currentTime / audio.duration) * 100;
  });
  document.getElementById('music-seek').addEventListener('input', function() {
    if (audio.duration) audio.currentTime = (this.value / 100) * audio.duration;
  });
  loadTrack(0, false);
</script>

</body>
      </html>
